<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<!-- Or if you want the latest version from the main branch -->
<!-- <script src="https://cdn.jsdelivr.net/npm/hls.js@canary"></script> -->
<video id="video"></video>
<script>
  var video = document.getElementById("video");
  var videoSrc = "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8";

  console.log("Attempting to load video:", videoSrc);

  if (Hls.isSupported()) {
    console.log("Hls.js is supported in this browser.");
    var hls = new Hls();
    hls.loadSource(videoSrc);
    console.log("Loaded source into hls.js:", videoSrc);
    hls.attachMedia(video);
    console.log("Attached video element to hls.js");
    hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
      console.log(
        "Manifest loaded, found",
        data.levels.length,
        "quality levels",
      );
    });
    hls.on(Hls.Events.ERROR, function (event, data) {
      console.error("Hls.js error:", data);
    });
  } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    console.log("HLS is natively supported. Setting video src directly.");
    video.src = videoSrc;
    video.addEventListener("loadedmetadata", function () {
      console.log("Native HLS: Video metadata loaded.");
    });
    video.addEventListener("error", function (e) {
      console.error("Native HLS: Error loading video.", e);
    });
  } else {
    console.warn("HLS is not supported in this browser.");
  }
</script>
